name: Android CI (Compile APK)

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # 1. משיכת הקוד
    - name: Checkout Source Code
      uses: actions/checkout@v4

    # 2. הגדרת סביבת ג'אווה 17
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    # 3. התקנת גראדל 8.2
    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: '8.2'

    # 4. הרצת הבנייה של האפליקציה
    - name: Build Debug APK
      run: gradle :app:assembleDebug

    # 5. שינוי סיומת הקובץ ואריזה ב-ZIP (עבודה עם נתיב אבסולוטי קשיח)
    - name: Rename and Pack into ZIP
      run: |
        cd app/build/outputs/apk/debug/
        mv app-debug.apk app-debug.ap_
        zip -r "${{ github.workspace }}/crt-installer.zip" app-debug.ap_

    # 6. העלאת קובץ ה-ZIP המוכן להורדה מגיטהאב
    - name: Upload Compiled ZIP
      uses: actions/upload-artifact@v4
      with:
        name: crt-installer-zip-package
        path: ${{ github.workspace }}/crt-installer.zip
