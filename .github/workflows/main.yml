name: Android CI (Compile APK)

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # 1. משיכת הקוד מהמאגר שלך בגיטהאב
    - name: Checkout Source Code
      uses: actions/checkout@v4

    # 2. הגדרת סביבת Java 17 (חובה בשביל Gradle 8+)
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    # 3. הענקת הרשאות הרצה לקובץ ה-Gradlew של האפליקציה
    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    # 4. הרצת תהליך הקמפול (הפקודה שמייצרת את ה-APK)
    - name: Build Debug APK
      run: ./gradlew assembleDebug

    # 5. שמירה והורדה של קובץ ה-APK המוכן מהשרת של גיטהאב
    - name: Upload Compiled APK
      uses: actions/upload-artifact@v4
      with:
        name: crt-installer-debug-apk
        path: app/build/outputs/apk/debug/app-debug.apk
