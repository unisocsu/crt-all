name: Android CI (Compile APK)

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # 1. משיכת הקוד
    - name: Checkout Source Code
      uses: actions/checkout@v4

    # 2. הגדרת סביבת ג'אווה 17 תואמת לגראדל 8
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    # 3. התקנת גראדל 8.2 (חוסך את הצורך ב-gradlew מקומי שלא קיים כרגע)
    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: '8.2'

    # 4. הרצת הבנייה הישירה של האפליקציה
    - name: Build Debug APK
      run: gradle :app:assembleDebug

    # 5. חילוץ ושמירת ה-APK להורדה ישירה בסיום הריצה
    - name: Upload Compiled APK
      uses: actions/upload-artifact@v4
      with:
        name: crt-installer-debug-apk
        path: app/build/outputs/apk/debug/app-debug.apk
